<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Moto Plánovač 🏍️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #121212; color: white; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .ui-panel {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(30, 30, 30, 0.9);
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
            pointer-events: none;
            text-align: center;
        }
        
        .leaflet-popup-content-wrapper { background: #222; color: white; border-radius: 8px; }
        .leaflet-popup-tip { background: #222; }
        input { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; width: 150px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <strong>🏍️ Moto Plánovač v1.0</strong><br>
        <span style="font-size: 0.8em; color: #aaa;">Klikni do mapy pro přidání bodu</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Inicializace mapy (střed Evropy)
        const map = L.map('map').setView([49.0, 15.0], 5);

        // Přidání mapových podkladů (OpenStreetMap Dark Mode styl)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Funkce pro přidání bodu
        function onMapClick(e) {
            const lat = e.latlng.lat.toFixed(5);
            const lng = e.latlng.lng.toFixed(5);
            
            const marker = L.marker(e.latlng, { draggable: true }).addTo(map);
            
            // Obsah bubliny (popup)
            const popupContent = `
                <div style="color:white;">
                    <b style="color:#fffa65;">Nový bod</b><br>
                    <input type="text" placeholder="Poznámka..." onchange="this.parentElement.querySelector('b').innerText = this.value"><br>
                    <small>${lat}, ${lng}</small><br>
                    <button onclick="this.closest('.leaflet-marker-icon').remove()" style="display:none;">Smazat</button>
                </div>
            `;
            
            marker.bindPopup(popupContent).openPopup();

            // Smazání pravým tlačítkem
            marker.on('contextmenu', function() {
                map.removeLayer(marker);
            });
        }

        map.on('click', onMapClick);
    </script>
</body>
</html>
