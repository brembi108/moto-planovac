<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto Plánovač PRO 🏍️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; }
        #map { height: 100vh; width: 100vw; }
        
        .ui-header {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(30, 30, 30, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #2ed573;
            text-align: center;
            pointer-events: none;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #2ed573;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
        }

        .btn-reset { background: #ff4757; color: white; }

        /* Schováme textový itinerář, aby nezavazel na mobilu */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div class="ui-header">
        <strong>📍 Moto Plánovač PRO</strong><br>
        <small id="status">Klikni do mapy pro start trasy</small>
    </div>

    <div class="controls">
        <button class="btn btn-reset" onclick="resetRoute()">Smazat trasu</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <script>
        // Inicializace mapy
        const map = L.map('map', {
            tap: false // Důležité pro opravu klikání na mobilech/Safari
        }).setView([49.0, 15.0], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Vytvoření plánovače
        const routingControl = L.Routing.control({
            waypoints: [],
            routeWhileDragging: true,
            lineOptions: {
                styles: [{ color: '#2ed573', opacity: 0.8, weight: 6 }]
            },
            createMarker: function(i, wp) {
                return L.marker(wp.latLng, { draggable: true })
                    .bindPopup(i === 0 ? "START" : "CÍL / PRŮJEZD " + i);
            }
        }).addTo(map);

        // Hlavní funkce pro klikání
        map.on('click', function(e) {
            console.log("Kliknuto na:", e.latlng); // Pro kontrolu v konzoli
            const currentWaypoints = routingControl.getWaypoints();
            
            // Najdeme první prázdný bod nebo přidáme nový
            const firstEmpty = currentWaypoints.findIndex(wp => !wp.latLng);
            
            if (firstEmpty !== -1) {
                routingControl.spliceWaypoints(firstEmpty, 1, e.latlng);
            } else {
                routingControl.spliceWaypoints(currentWaypoints.length, 0, e.latlng);
            }
            
            document.getElementById('status').innerText = "Trasa se přepočítává...";
        });

        function resetRoute() {
            routingControl.setWaypoints([]);
            document.getElementById('status').innerText = "Klikni do mapy pro start trasy";
        }

        // Oprava pro Vercel/Mobil - vynucení překreslení
        setTimeout(() => { map.invalidateSize(); }, 500);
    </script>
</body>
</html>
