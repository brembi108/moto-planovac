<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Moto Plánovač PRO 🏍️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .ui-header {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(30, 30, 30, 0.95);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #2ed573;
            text-align: center;
        }

        /* Skrytí ošklivého textového itineráře Leafletu, chceme jen mapu */
        .leaflet-routing-container {
            background: rgba(30, 30, 30, 0.9) !important;
            color: white !important;
            border-radius: 10px;
            border: 1px solid #444;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .leaflet-routing-alt { color: white !important; }
    </style>
</head>
<body>

    <div class="ui-header">
        <strong>📍 Plánovač Trasy</strong><br>
        <small style="color: #2ed573;">Klikáním do mapy tvoř trasu</small>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        // Nastavení mapy na Evropu
        const map = L.map('map').setView([49.0, 15.0], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Inicializace plánovače trasy
        const control = L.Routing.control({
            waypoints: [], // Začínáme s prázdnou trasou
            routeWhileDragging: true,
            language: 'cs',
            lineOptions: {
                styles: [{ color: '#2ed573', opacity: 0.8, weight: 6 }]
            },
            createMarker: function(i, wp) {
                return L.marker(wp.latLng, {
                    draggable: true
                }).bindPopup("Bod " + (i + 1));
            }
        }).addTo(map);

        // Funkce: Kliknutím do mapy přidáš bod trasy
        map.on('click', function(e) {
            const container = control.getPlan();
            const waypoints = container.getWaypoints();
            
            // Najdeme první volné místo nebo přidáme na konec
            let freeIndex = waypoints.findIndex(wp => wp.latLng === null);
            
            if (freeIndex !== -1) {
                waypoints[freeIndex].latLng = e.latlng;
            } else {
                waypoints.push(L.Routing.waypoint(e.latlng));
            }
            
            control.setWaypoints(waypoints);
        });
    </script>
</body>
</html>
